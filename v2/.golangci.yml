version: "2"

linters:
  default: standard
  enable:
    - bodyclose       # HTTP response body is closed
    - errorlint       # Correct errors.Is/As/wrapping (not bare !=)
    - forcetypeassert # No unchecked type assertions
    - gocritic        # Compound operators, if-else→switch, and more
    - prealloc        # Pre-allocate slices where length is known
    - revive          # Naming conventions, godoc, shadowed builtins
    - unconvert       # Remove unnecessary type conversions

  exclusions:
    rules:
      # Error-path tests return (nil, err) — the response body is nil, nothing to close.
      - path: _test\.go
        linters:
          - bodyclose
