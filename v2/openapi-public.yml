    WebhookIntegration:
      description: |-
        Represents the webhook integration

        The extra fields below are not available in response by default. Ask for them explicitly in the query parameter `fields[webhook-integrations]`:
        * statistics
      properties:
        attributes:
          properties:
            enabled:
              description: Webhook can be turned off by setting to `false`.
              type: boolean
            headers:
              items:
                properties:
                  name:
                    description: A header name.
                    type: string
                  sensitive:
                    default: false
                    description: Whether the value is a sensitive.
                    type: boolean
                  value:
                    description: A header value. Not visible if sensitive.
                    nullable: true
                    type: string
                required:
                - name
                - value
                type: object
              nullable: true
              type: array
            http-method:
              default: POST
              readOnly: true
              type: string
            is-shared:
              description: Indicates whether the webhook is available in any environment of the account without directly linking
                it.
              type: boolean
            last-triggered-at:
              description: The Date/Time of the last notification.
              format: date-time
              nullable: true
              readOnly: true
              type: string
            max-attempts:
              default: 3
              description: The number of retry attempts.
              type: integer
            name:
              description: The name of the webhook. Use your target application/component name for better discoverability.
              maxLength: 255
              type: string
            secret-key:
              description: The secret passphrase for HMAC signature.
              maxLength: 1024
              type: string
            statistics:
              description: 'Webhook delivery statistics (delivered, failed and total) by periods: last hour, last day and
                last week'
              nullable: true
              properties:
                last-day:
                  properties:
                    delivered:
                      default: 0
                      type: integer
                    failed:
                      default: 0
                      type: integer
                    total:
                      default: 0
                      type: integer
                  type: object
                last-hour:
                  properties:
                    delivered:
                      default: 0
                      type: integer
                    failed:
                      default: 0
                      type: integer
                    total:
                      default: 0
                      type: integer
                  type: object
                last-week:
                  properties:
                    delivered:
                      default: 0
                      type: integer
                    failed:
                      default: 0
                      type: integer
                    total:
                      default: 0
                      type: integer
                  type: object
              readOnly: true
              type: object
            timeout:
              default: 15
              description: The HTTP transaction timeout.
              type: integer
            url:
              description: HTTP(s) destination URL.
              maxLength: 2048
              type: string
          required:
          - name
          - url
          type: object
        id:
          readOnly: true
          type: string
        links:
