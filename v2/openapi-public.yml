      description: Access Token for the Scalr API.
      properties:
        attributes:
          properties:
            created-at:
              description: Date/Time the token was created.
              format: date-time
              readOnly: true
              type: string
            description:
              description: The description of the token.
              maxLength: 255
              nullable: true
              type: string
            expires-at:
              description: Date/Time when the token is set to expire.
              format: date-time
              nullable: true
              readOnly: true
              type: string
            expires-in:
              description: The number of minutes until the token expires.
              nullable: true
              type: integer
            is-expired:
              default: false
              description: Whether the token is expired.
              readOnly: true
              type: boolean
            last-used-at:
              description: Date/Time when the token was last used.
              format: date-time
              nullable: true
              readOnly: true
              type: string
            name:
              description: The name of the token.
              maxLength: 64
              nullable: true
              type: string
            token:
              description: |-
                The JWT token which an API client should pass in the `Authorization: Bearer <token>`
