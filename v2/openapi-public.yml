        schema:
          type: string
      - description: Page size
        in: query
        name: page[size]
        required: false
        schema:
          type: string
      - description: Filter modules by name
        in: query
        name: filter[name]
        required: false
        schema:
          type: string
      - description: Filter modules by provider
        in: query
        name: filter[provider]
        required: false
        schema:
          type: string
      - description: Filter modules by source
        in: query
        name: filter[source]
        required: false
        schema:
          type: string
      - description: Filter modules by status
        in: query
        name: filter[status]
        required: false
        schema:
          type: string
      - description: Filter modules by environment
        in: query
        name: filter[environment]
        required: false
        schema:
          type: string
      - description: Filter modules by account
        in: query
        name: filter[account]
        required: false
        schema:
          type: string
