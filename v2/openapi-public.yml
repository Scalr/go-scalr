paths:
  /access-policies:
    get:
      description: |
        This endpoint returns a list of [IAM](https://docs.scalr.io/docs/identity-and-access-management) access policies.
      operationId: get_access_policies
      parameters:
      - description: Page number
        in: query
        name: page[number]
        required: false
        schema:
          type: string
      - description: Page size
        in: query
        name: page[size]
        required: false
        schema:
          type: string
