name: 'v2 / Release'

on:
  workflow_dispatch:
    inputs:
      fatmouse-ref:
        description: 'Fatmouse git ref (tag/SHA) to fetch spec from. Leave empty to download from production URL.'
        required: false
        type: string
      api-version:
        description: 'Scalr API version (e.g. v2604.7.2). Informational only.'
        required: false
        type: string
      force-version:
        description: 'Override auto-bumped client version (e.g. 2.1.0). Use for generator-only releases. Skips "spec unchanged" early-exit.'
        required: false
        type: string
      create-pr:
        description: 'Create PR instead of pushing directly to master. Auto-forced on breaking changes.'
        required: false
        type: boolean
        default: false

concurrency:
  group: v2-release
  cancel-in-progress: false

jobs:
  # Early precheck: determine if a release is needed and whether there are breaking changes.
  check:
    name: Check Spec
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      spec_changed:   ${{ steps.spec-check.outputs.spec_changed }}
      new_sha:        ${{ steps.spec-check.outputs.new_sha }}
      has_breaking:   ${{ steps.breaking.outputs.has_breaking }}
      api_changelog:  ${{ steps.breaking.outputs.changelog }}
      pr_mode:        ${{ steps.decide.outputs.pr_mode }}

    steps:
      - name: Checkout go-scalr
        uses: actions/checkout@v5

      - name: Sudo GitHub Token
        id: token
        if: inputs.fatmouse-ref != ''
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SUDO_GHA_APP_ID }}
          private-key: ${{ secrets.SUDO_GHA_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout fatmouse
        if: inputs.fatmouse-ref != ''
        uses: actions/checkout@v5
        with:
          repository: Scalr/fatmouse
          token: ${{ steps.token.outputs.token }}
          ref: ${{ inputs.fatmouse-ref }}
          path: _fatmouse
          sparse-checkout: taco/openapi

      - name: Copy spec from fatmouse
        if: inputs.fatmouse-ref != ''
        run: cp _fatmouse/taco/openapi/openapi-public.yml v2/openapi-public.yml.new

      - name: Download spec from production URL
        if: inputs.fatmouse-ref == ''
        run: curl -sSfL https://scalr.io/api/iacp/v3/openapi-public.yml -o v2/openapi-public.yml.new

      - name: Check spec changed
        id: spec-check
        run: |
          NEW_SHA=$(shasum -a 256 v2/openapi-public.yml.new | awk '{print $1}')
          OLD_SHA=$(grep 'spec_sha256:' v2/.version.yml | sed 's/.*"\(.*\)"/\1/' | tr -d '[:space:]')
          echo "new_sha=$NEW_SHA" >> $GITHUB_OUTPUT
          if [ "$NEW_SHA" = "$OLD_SHA" ]; then
            echo "spec_changed=false" >> $GITHUB_OUTPUT
            echo "Spec unchanged (SHA: $NEW_SHA)"
          else
            echo "spec_changed=true" >> $GITHUB_OUTPUT
            echo "Spec changed: $OLD_SHA → $NEW_SHA"
          fi

      - name: Install oasdiff
        if: steps.spec-check.outputs.spec_changed == 'true'
        run: curl -fsSL https://raw.githubusercontent.com/oasdiff/oasdiff/main/install.sh | sh

      - name: Preprocess OpenAPI specs for oasdiff
        if: steps.spec-check.outputs.spec_changed == 'true'
        run: |
          # oasdiff's openapi loader tries to fetch external $refs, but the files are not available locally.
          # Since those are only examples ($ref: examples/foo.yml) and are not part of the API contract -
          # we just strip them from the spec before diffing.
          python3 - <<'PYEOF'
          import yaml, sys

          def strip_example_refs(obj):
              if isinstance(obj, dict):
                  if '$ref' in obj and 'examples/' in str(obj['$ref']):
                      return {'value': {}}
                  return {k: strip_example_refs(v) for k, v in obj.items()}
              if isinstance(obj, list):
                  return [strip_example_refs(i) for i in obj]
              return obj

          for src, dst in [
              ('v2/openapi-public.yml',     '/tmp/oasdiff-old.yml'),
              ('v2/openapi-public.yml.new', '/tmp/oasdiff-new.yml'),
          ]:
              with open(src) as f:
                  data = yaml.safe_load(f)
              with open(dst, 'w') as f:
                  yaml.dump(strip_example_refs(data), f, default_flow_style=False, allow_unicode=True)
          PYEOF

      - name: Detect breaking changes
        id: breaking
        if: steps.spec-check.outputs.spec_changed == 'true'
        run: |
          CHANGELOG=$(oasdiff changelog /tmp/oasdiff-old.yml /tmp/oasdiff-new.yml --format text 2>&1 || true)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          set +e
          oasdiff breaking /tmp/oasdiff-old.yml /tmp/oasdiff-new.yml --fail-on ERR > /dev/null 2>&1
          EXIT=$?
          set -e
          if [ $EXIT -eq 0 ]; then
            echo "has_breaking=false" >> $GITHUB_OUTPUT
            echo "No breaking changes detected."
          elif [ $EXIT -eq 1 ]; then
            echo "has_breaking=true" >> $GITHUB_OUTPUT
            echo "Breaking changes detected — release will require PR review."
          else
            echo "oasdiff exited with unexpected code $EXIT" >&2
            exit $EXIT
          fi

      - name: Make release decision
        id: decide
        run: |
          SPEC_CHANGED="${{ steps.spec-check.outputs.spec_changed }}"
          FORCE_VERSION="${{ inputs.force-version }}"
          HAS_BREAKING="${{ steps.breaking.outputs.has_breaking }}"
          CREATE_PR="${{ inputs.create-pr }}"

          if [ "$SPEC_CHANGED" = "false" ] && [ -z "$FORCE_VERSION" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Nothing to release: spec unchanged and no force-version provided."
            exit 0
          fi
          echo "should_release=true" >> $GITHUB_OUTPUT

          # PR mode: forced when breaking changes or when explicitly requested.
          # Also forced when force-version is combined with an unexpected spec change
          # (so generator-only releases do not silently contain spec changes).
          if [ "$HAS_BREAKING" = "true" ] || \
             [ "$CREATE_PR" = "true" ] || \
             { [ -n "$FORCE_VERSION" ] && [ "$SPEC_CHANGED" = "true" ]; }; then
            echo "pr_mode=true" >> $GITHUB_OUTPUT
            if [ "$HAS_BREAKING" = "true" ]; then
              echo "PR mode: breaking API changes detected."
            elif [ -n "$FORCE_VERSION" ] && [ "$SPEC_CHANGED" = "true" ]; then
              echo "PR mode: force-version with unexpected spec change — requires human review."
            else
              echo "PR mode: requested by user."
            fi
          else
            echo "pr_mode=false" >> $GITHUB_OUTPUT
            echo "Automatic release mode."
          fi

  release:
    name: Release
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Sudo GitHub Token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SUDO_GHA_APP_ID }}
          private-key: ${{ secrets.SUDO_GHA_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout go-scalr
        uses: actions/checkout@v5
        with:
          token: ${{ steps.token.outputs.token }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'v2/.go-version'
          cache: true
          cache-dependency-path: v2/go.sum

      - name: Checkout fatmouse
        if: inputs.fatmouse-ref != ''
        uses: actions/checkout@v5
        with:
          repository: Scalr/fatmouse
          token: ${{ steps.token.outputs.token }}
          ref: ${{ inputs.fatmouse-ref }}
          path: _fatmouse
          sparse-checkout: taco/openapi

      - name: Copy spec from fatmouse
        if: inputs.fatmouse-ref != ''
        run: cp _fatmouse/taco/openapi/openapi-public.yml v2/openapi-public.yml.new

      - name: Download spec from production URL
        if: inputs.fatmouse-ref == ''
        run: curl -sSfL https://scalr.io/api/iacp/v3/openapi-public.yml -o v2/openapi-public.yml.new

      - name: Replace committed spec
        if: needs.check.outputs.spec_changed == 'true'
        run: mv v2/openapi-public.yml.new v2/openapi-public.yml

      - name: Discard unused spec download
        if: needs.check.outputs.spec_changed == 'false'
        run: rm -f v2/openapi-public.yml.new

      - name: Determine version
        id: version
        run: |
          semver_bump() {
            local ver="$1" bump="$2"
            local base="${ver#v}"     # strip leading v
            base="${base%%-*}"        # strip pre-release suffix
            local major minor patch
            IFS='.' read -r major minor patch <<< "$base"
            case "$bump" in
              minor) printf '%s.%s.0' "$major" "$((minor + 1))" ;;
              patch) printf '%s.%s.%s' "$major" "$minor" "$((patch + 1))" ;;
            esac
          }

          FORCE="${{ inputs.force-version }}"
          if [ -n "$FORCE" ]; then
            VERSION="${FORCE#v}"   # strip leading v
            echo "Using force-version: $VERSION"
          else
            CURRENT=$(grep 'client_version:' v2/.version.yml | sed 's/.*"\(.*\)"/\1/')
            if [ "${{ needs.check.outputs.has_breaking }}" = "true" ]; then
              VERSION=$(semver_bump "$CURRENT" minor)
              echo "Breaking changes — bumping minor: $CURRENT → $VERSION"
            else
              VERSION=$(semver_bump "$CURRENT" patch)
              echo "Bumping patch: $CURRENT → $VERSION"
            fi
          fi

          # Determine pre-release flag from version string.
          if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

          if [ -n "${{ inputs.api-version }}" ]; then
            API_VERSION="${{ inputs.api-version }}"
          else
            API_VERSION=$(grep 'api_version:' v2/.version.yml | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "api_version=$API_VERSION" >> $GITHUB_OUTPUT

      - name: Update version.go
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > v2/internal/generator/static/client/version.go <<EOF
          package client

          // Version is the current version of the client.
          var Version = "v${VERSION}"
          EOF

      - name: Update .version.yml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          API_VERSION="${{ steps.version.outputs.api_version }}"
          SPEC_SHA="${{ needs.check.outputs.new_sha }}"
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > v2/.version.yml <<EOF
          client_version: "v${VERSION}"
          api_version: "${API_VERSION}"
          generated_at: "${GENERATED_AT}"
          spec_sha256: "${SPEC_SHA}"
          EOF

      - name: Generate client
        run: cd v2 && make generate

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6.1
          working-directory: v2
          args: --config=.golangci.yml cmd/... internal/...

      - name: Refresh e2e golden files
        run: cd v2 && go test -run TestE2EGenerate ./internal/generator/ -args -update

      - name: Run unit tests
        run: cd v2 && make test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit release changes
        run: |
          git add v2/
          git commit -m "Release: v${{ steps.version.outputs.version }} (API ${{ steps.version.outputs.api_version }})"

      # PR release mode ------------------------------------------------

      - name: Push to release branch (PR mode)
        if: needs.check.outputs.pr_mode == 'true'
        run: git push origin "HEAD:release/v${{ steps.version.outputs.version }}"

      - name: Create labels if missing
        if: needs.check.outputs.pr_mode == 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          gh label create "release" --color "0075ca" --description "Release PR" --force 2>/dev/null || true
          gh label create "breaking-change" --color "d93f0b" --description "Contains breaking API changes" --force 2>/dev/null || true

      - name: Create PR
        if: needs.check.outputs.pr_mode == 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          HAS_BREAKING: ${{ needs.check.outputs.has_breaking }}
          API_CHANGELOG: ${{ needs.check.outputs.api_changelog }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          API_VERSION="${{ steps.version.outputs.api_version }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"
          ACTOR="${{ github.actor }}"

          if [ "$HAS_BREAKING" = "true" ]; then
            TITLE="Release: v${VERSION} (BREAKING — API ${API_VERSION})"
            LABEL_FLAGS="--label release --label breaking-change"
            WARNING=$'> [!WARNING]\n> **Breaking API changes detected.** Review the changelog below before merging.'
          else
            TITLE="Release: v${VERSION} (API ${API_VERSION})"
            LABEL_FLAGS="--label release"
            WARNING=""
          fi

          # Write body to a temp file to avoid shell injection from multi-line changelog content.
          BODY_FILE=$(mktemp)
          printf '## Release v%s\n\n**Client Version:** `v%s`\n**API Version:** `%s`\n**Pre-release:** `%s`\n\n%s\n\n### API Changelog\n\n```\n%s\n```\n\n---\nTriggered by *@%s*\n' \
            "$VERSION" "$VERSION" "$API_VERSION" "$PRERELEASE" "$WARNING" "$API_CHANGELOG" "$ACTOR" \
            > "$BODY_FILE"

          gh pr create \
            --base master \
            --head "release/v${VERSION}" \
            --title "$TITLE" \
            --body-file "$BODY_FILE" \
            $LABEL_FLAGS

          rm -f "$BODY_FILE"

      # Automatic release mode ------------------------------------------------

      - name: Push to master (direct release)
        if: needs.check.outputs.pr_mode == 'false'
        run: git push origin HEAD:master

      - name: Tag release
        if: needs.check.outputs.pr_mode == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      # GitHub Release ------------------------------------------------

      - name: Generate changelog
        id: changelog
        if: needs.check.outputs.pr_mode == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ steps.version.outputs.tag }}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            BODY=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..${{ steps.version.outputs.tag }}")
          else
            BODY="Initial release."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: needs.check.outputs.pr_mode == 'false'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          GIT_CHANGELOG: ${{ steps.changelog.outputs.body }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          API_VERSION="${{ steps.version.outputs.api_version }}"
          SPEC_SHA="${{ needs.check.outputs.new_sha }}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Write release notes to a temp file to avoid shell injection from multiline $GIT_CHANGELOG.
          NOTES_FILE=$(mktemp)
          {
            printf '# go-scalr %s\n\n' "$TAG"
            printf 'Auto-generated Go client for Scalr API.\n\n'
            printf '## Installation\n\n'
            printf '```bash\ngo get github.com/Scalr/go-scalr/v2@%s\n```\n\n' "$TAG"
            printf '## Version Information\n\n'
            printf '| Field | Value |\n|-------|-------|\n'
            printf '| Client Version | `%s` |\n' "$TAG"
            printf '| API Version | `%s` |\n' "$API_VERSION"
            printf '| Spec SHA256 | `%s` |\n\n' "$SPEC_SHA"
            printf '## Changelog\n\n%s\n' "$GIT_CHANGELOG"
          } > "$NOTES_FILE"

          gh release create "$TAG" \
            --title "go-scalr ${TAG}" \
            --notes-file "$NOTES_FILE" \
            $PRERELEASE_FLAG

          rm -f "$NOTES_FILE"

      # Slack notification ------------------------------------------------

      - name: Notify Slack — release published
        if: success() && needs.check.outputs.pr_mode == 'false'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "channel" : "#release-sync",
              "text": ":tada: go-scalr ${{ steps.version.outputs.tag }} released!",
              "attachments": [{
                "color": "good",
                "fields": [
                  {"title": "Version", "value": "${{ steps.version.outputs.tag }}", "short": true},
                  {"title": "API Version", "value": "${{ steps.version.outputs.api_version }}", "short": true},
                  {"title": "Release", "value": "https://github.com/Scalr/go-scalr/releases/tag/${{ steps.version.outputs.tag }}", "short": false}
                ]
              }]
            }

      - name: Notify Slack — PR created (non-breaking)
        if: success() && needs.check.outputs.pr_mode == 'true' && needs.check.outputs.has_breaking != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "channel" : "#release-sync",
              "text": ":pr: go-scalr release ${{ steps.version.outputs.tag }} — PR created for review",
              "attachments": [{
                "color": "#0075ca",
                "fields": [
                  {"title": "Version", "value": "${{ steps.version.outputs.tag }}", "short": true},
                  {"title": "API Version", "value": "${{ steps.version.outputs.api_version }}", "short": true},
                  {"title": "PRs", "value": "https://github.com/Scalr/go-scalr/pulls", "short": false}
                ]
              }]
            }

      - name: Notify Slack — PR created (breaking changes)
        if: success() && needs.check.outputs.pr_mode == 'true' && needs.check.outputs.has_breaking == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "channel" : "#release-sync",
              "text": ":warning: go-scalr release ${{ steps.version.outputs.tag }} has breaking API changes — PR requires review",
              "attachments": [{
                "color": "warning",
                "fields": [
                  {"title": "Version", "value": "${{ steps.version.outputs.tag }}", "short": true},
                  {"title": "API Version", "value": "${{ steps.version.outputs.api_version }}", "short": true},
                  {"title": "PRs", "value": "https://github.com/Scalr/go-scalr/pulls", "short": false}
                ]
              }]
            }

      - name: Notify Slack — failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "channel" : "#release-sync",
              "text": "<!subteam^S043RKZ2F9C> go-scalr release failed for ${{ steps.version.outputs.tag || 'unknown version' }}",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Job URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
