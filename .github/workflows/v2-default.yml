name: 'v2 / Default'

on:
  push:
    branches:
      - master
    paths:
      - v2/**
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - master
    paths:
      - v2/**

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'v2/.go-version'
          cache: true
          cache-dependency-path: v2/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6.1
          working-directory: v2
          args: --config=.golangci.yml

      - name: Validate Generated Client
        run: |
          cd v2
          make generate
          if [ -n "$(git status --porcelain .)" ]; then
            echo "::error:: Generated code is out of date. Run 'make generate' and commit the result."
            git diff --stat .
            exit 1
          fi

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'v2/.go-version'
          cache: true
          cache-dependency-path: v2/go.sum

      - name: Run Unit Tests
        run: cd v2 && make test
